{% extends "base.html" %}
{% block title %}frpc.toml - frp-nest-panel{% endblock %}
{% block content %}
<header class="page-header row-between">
  <div>
    <p class="eyebrow">frpc.toml</p>
    <h1>{{ tunnel.name }}</h1>
  </div>
  <a role="button" href="/tunnels/{{ tunnel.id }}/frpc.toml">下载</a>
</header>

<section class="panel-card">
  <div class="actions config-actions">
    <button type="button" data-copy-target="frpc-config" data-copy-status="copy-status">复制配置</button>
    <button class="secondary outline" type="button" data-select-target="frpc-config" data-select-status="copy-status">全选</button>
    <span id="copy-status" class="copy-status" aria-live="polite"></span>
  </div>
  <textarea id="frpc-config" class="config-box" readonly rows="18">{{ frpc_toml }}</textarea>
</section>
{% endblock %}
