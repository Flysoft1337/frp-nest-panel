services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: frp_panel
      POSTGRES_USER: frp_panel
      POSTGRES_PASSWORD: frp_panel
    volumes:
      - postgres-data:/var/lib/postgresql/data

  frps:
    image: snowdreamtech/frps:0.69.1
    entrypoint: /usr/bin/frps
    restart: unless-stopped
    network_mode: host
    command: -c /etc/frp/frps.toml
    volumes:
      - ./frps/frps.toml:/etc/frp/frps.toml:ro

  panel:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres-data:
